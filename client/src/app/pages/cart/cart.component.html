<div class="cart-container">

  <h1>🛒 My Cart</h1>

  <div *ngIf="items.length === 0" class="empty-cart">
    <h3>Your cart is empty</h3>
  </div>

  <div *ngFor="let item of items; let i=index" class="cart-card">

    <img
      class="cart-image"
      [src]="'http://localhost:3000/images/' + item.image">

    <div class="cart-info">

      <h2>{{ item.name }}</h2>

      <p>📍 {{ item.location }}</p>

      <p class="price">💰 ₹{{ item.price }}</p>

    </div>

    <button
      class="remove-btn"
      (click)="remove(i)">

      Remove

    </button>

  </div>

</div>
